<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>skill 训练中心 - 悠聊 Web</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/skill-training.css" />
  </head>
  <body class="training-body">
    <div id="toastHost" class="toast-host" aria-live="polite"></div>

    <header class="training-topbar">
      <div class="training-brand">
        <span class="brand-shield small">U</span>
        <div>
          <strong>skill 训练中心</strong>
          <span>采样真实回复，AI 初审后由你逐条标记</span>
        </div>
      </div>
      <div class="training-actions">
        <a class="light-button training-link" href="/">返回工作台</a>
        <button id="sampleTraining" class="light-button" type="button">采样日常回复</button>
        <button id="aiAuditCurrent" class="light-button" type="button">AI 初审当前条</button>
        <button id="refreshTraining" class="send-button" type="button">刷新待审</button>
      </div>
    </header>

    <main class="training-shell">
      <section class="training-summary-band">
        <div class="training-filterbar">
          <label>
            <span>训练日期</span>
            <input id="trainingDate" type="date" />
          </label>
          <div class="training-segment" role="group" aria-label="训练范围">
            <button class="is-active" type="button" data-scope="today">今日</button>
            <button type="button" data-scope="all">全部</button>
          </div>
          <label class="training-check">
            <input id="onlyIssues" type="checkbox" checked />
            <span>只看需要处理</span>
          </label>
          <label class="training-check compact">
            <input id="autoAuditTraining" type="checkbox" />
            <span>打开页面时自动采样</span>
          </label>
        </div>

        <div class="training-summary-grid" id="summaryGrid"></div>
        <div class="training-summary-lines" id="summaryLines"></div>
        <div class="training-flow-note">
          <strong>标记规则</strong>
          <span>AI 初审只生成候选，不会自动入库。保存并启用：确认可直接推荐；保存修改：你已改好关键词、文案或图片；继续人工处理：先留在待审；不再使用：停用但保留记录；删除记录：彻底移除误学样本。</span>
        </div>

        <section class="promptworks-import-panel" aria-label="PromptWorks 导入训练">
          <div class="promptworks-import-title">
            <strong>PromptWorks 导入训练</strong>
            <span id="promptWorksImportStatus">先预览真实样本，再确认导入旁路训练台。</span>
          </div>
          <div class="promptworks-import-controls">
            <label>
              <span>联系人</span>
              <input id="promptWorksContactLimit" type="number" min="1" max="80" value="18" />
            </label>
            <label>
              <span>消息</span>
              <input id="promptWorksMessageLimit" type="number" min="20" max="180" value="80" />
            </label>
            <label>
              <span>样本</span>
              <input id="promptWorksSampleLimit" type="number" min="1" max="500" value="80" />
            </label>
            <button id="previewPromptWorksImport" class="mini-action" type="button">预览样本</button>
            <button id="runPromptWorksImport" class="mini-action primary" type="button">确认导入</button>
          </div>
          <div id="promptWorksImportResult" class="promptworks-import-result"></div>
        </section>
      </section>

      <section class="training-list-head">
        <div>
          <strong>数据标记队列</strong>
          <span id="trainingCount">0 条</span>
        </div>
        <div class="training-legend">
          <span class="training-chip danger">疑似脏学习</span>
          <span class="training-chip warn">待优化</span>
          <span class="training-chip ok">可入库</span>
        </div>
      </section>

      <section id="trainingList" class="training-list" aria-label="skill 训练列表"></section>
    </main>

    <script src="/skill-training.js"></script>
  </body>
</html>
