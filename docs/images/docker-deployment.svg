<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="680" viewBox="0 0 1280 680" role="img" aria-labelledby="title desc">
  <title id="title">Docker 部署架构</title>
  <desc id="desc">展示浏览器、Youliao Web 容器、悠聊服务端、数据库、OSS 和 AI 服务之间的连接关系。</desc>
  <rect width="1280" height="680" fill="#f8fafc"/>
  <text x="70" y="72" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#132238">Docker 部署架构</text>
  <text x="70" y="106" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">Web 客户端独立成容器，运行时挂载配置和数据，后端服务、数据库和 AI 渠道分开维护。</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4268a9"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f2a4a" flood-opacity=".12"/>
    </filter>
  </defs>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="70" y="178" width="210" height="116" rx="18" fill="#fff" stroke="#dbe5f0" filter="url(#shadow)"/>
    <text x="102" y="217" font-size="18" font-weight="800" fill="#132238">客服浏览器</text>
    <text x="102" y="249" font-size="14" fill="#64748b">访问 Web 工作台</text>
    <text x="102" y="273" font-size="14" fill="#64748b">http://host:5177</text>
    <rect x="406" y="142" width="300" height="216" rx="22" fill="#eaf3ff" stroke="#9ec3ff" filter="url(#shadow)"/>
    <text x="438" y="185" font-size="20" font-weight="800" fill="#123d7a">Youliao Web 容器</text>
    <text x="438" y="220" font-size="14" fill="#255aa8">Node.js 静态服务</text>
    <text x="438" y="246" font-size="14" fill="#255aa8">/api 代理</text>
    <text x="438" y="272" font-size="14" fill="#255aa8">/local/signalr/consume</text>
    <text x="438" y="298" font-size="14" fill="#255aa8">/ai/chat/completions</text>
    <text x="438" y="324" font-size="14" fill="#255aa8">/local/reply-skills</text>
    <rect x="830" y="142" width="300" height="132" rx="20" fill="#fff" stroke="#dbe5f0" filter="url(#shadow)"/>
    <text x="862" y="183" font-size="19" font-weight="800" fill="#132238">悠聊服务端</text>
    <text x="862" y="216" font-size="14" fill="#64748b">HTTP API / SignalR Hub</text>
    <text x="862" y="240" font-size="14" fill="#64748b">可运行在宿主机或其他容器</text>
    <rect x="830" y="320" width="300" height="96" rx="20" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
    <text x="862" y="358" font-size="18" font-weight="800" fill="#14532d">MySQL / 数据库</text>
    <text x="862" y="390" font-size="14" fill="#166534">会话、订单、快捷回复等真实数据</text>
    <rect x="830" y="462" width="300" height="96" rx="20" fill="#fff7ed" stroke="#fed7aa" filter="url(#shadow)"/>
    <text x="862" y="500" font-size="18" font-weight="800" fill="#7c2d12">AI / OSS 外部服务</text>
    <text x="862" y="532" font-size="14" fill="#9a3412">OpenAI 兼容端点、图片上传</text>
    <rect x="406" y="426" width="300" height="132" rx="20" fill="#ffffff" stroke="#dbe5f0" filter="url(#shadow)"/>
    <text x="438" y="466" font-size="18" font-weight="800" fill="#132238">挂载目录</text>
    <text x="438" y="500" font-size="14" fill="#64748b">config/ai-providers.json</text>
    <text x="438" y="524" font-size="14" fill="#64748b">data/reply-skills.json</text>
    <text x="438" y="548" font-size="14" fill="#64748b">logs/api-capture.ndjson</text>
    <path d="M284 236 H394" stroke="#4268a9" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
    <path d="M710 208 H818" stroke="#4268a9" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
    <path d="M982 278 V308" stroke="#4268a9" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
    <path d="M708 292 C760 292 770 510 818 510" stroke="#4268a9" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
    <path d="M556 420 V370" stroke="#4268a9" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  </g>
</svg>
