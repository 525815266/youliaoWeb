      <stop offset="1" stop-color="#e8eef7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#12345a" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="42" y="36" width="1196" height="688" rx="20" fill="#ffffff" filter="url(#shadow)"/>
