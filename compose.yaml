services:
  youchat-dev-web:
    build:
      context: .
    image: youchat-dev-web:local
    container_name: ${WEB_CONTAINER_NAME:-youchat-dev-web}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5177}:5177"
    environment:
      NODE_ENV: production
      PORT: "5177"
      YOUCHAT_API_BASE: ${YOUCHAT_API_BASE:-http://host.docker.internal:18080/api}
      YOUCHAT_AI_BASE: ${YOUCHAT_AI_BASE:-}
      YOUCHAT_AI_MODEL: ${YOUCHAT_AI_MODEL:-}
      YOUCHAT_MYSQL_CONNECTION_STRING: ${YOUCHAT_MYSQL_CONNECTION_STRING:-}
      YOUCHAT_DATABASE_GUARD_ENABLED: ${YOUCHAT_DATABASE_GUARD_ENABLED:-1}
      YOUCHAT_DATABASE_GUARD_INTERVAL_MS: ${YOUCHAT_DATABASE_GUARD_INTERVAL_MS:-300000}
      YOUCHAT_DATABASE_GUARD_MIN_HISTORY_COUNT: ${YOUCHAT_DATABASE_GUARD_MIN_HISTORY_COUNT:-1000}
      YOUCHAT_SERVICE_DIR: ${YOUCHAT_SERVICE_DIR:-/youchat-service}
      YOUCHAT_CONFIG_REPAIR_WAIT_MS: ${YOUCHAT_CONFIG_REPAIR_WAIT_MS:-45000}
      PROMPTWORKS_API_BASE: ${PROMPTWORKS_API_BASE:-http://host.docker.internal:5188/api/v1}
      PROMPTWORKS_TIMEOUT_MS: ${PROMPTWORKS_TIMEOUT_MS:-60000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - ${FNOS_YOUCHAT_SERVICE_DIR:-/vol1/1000/Docker/youchat}:${YOUCHAT_SERVICE_DIR:-/youchat-service}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:5177/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
